<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <style>
    .frame { stroke: #C8372D; }
    .parts { stroke: #1A1A1A; fill: #1A1A1A; }
    .wheel { stroke: #1A1A1A; }
    @media (prefers-color-scheme: dark) {
      .parts { stroke: #FFF; fill: #FFF; }
      .wheel { stroke: #FFF; }
    }
  </style>
  <!-- Rear wheel -->
  <circle cx="8.5" cy="22" r="6.5" fill="none" class="wheel" stroke-width="1.8"/>
  <circle cx="8.5" cy="22" r="1" class="parts"/>
  <!-- Front wheel -->
  <circle cx="23.5" cy="22" r="6.5" fill="none" class="wheel" stroke-width="1.8"/>
  <circle cx="23.5" cy="22" r="1" class="parts"/>
  <!-- Frame -->
  <polyline points="8.5,22 15,12 23.5,22" fill="none" class="frame" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="8.5" y1="22" x2="20" y2="12" fill="none" class="frame" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="12" x2="20" y2="12" fill="none" class="frame" stroke-width="2" stroke-linecap="round"/>
  <!-- Fork -->
  <line x1="22" y1="10" x2="23.5" y2="22" fill="none" class="parts" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Handlebar -->
  <path d="M20,12 L22,10 Q24,8 26,9" fill="none" class="parts" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Seat post + seat -->
  <line x1="15" y1="12" x2="15.2" y2="10" fill="none" class="parts" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.5" y1="10" x2="16.5" y2="10" fill="none" class="parts" stroke-width="2" stroke-linecap="round"/>
</svg>
